name: 📁 Zarządzaj folderami

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Akcja (add / remove)'
        required: true
        type: choice
        options:
          - add
          - remove
      folder_id:
        description: 'ID folderu (np. praca_oj)'
        required: true
      folder_name:
        description: 'Nazwa folderu (np. Praca O&J)'
        required: false
      folder_icon:
        description: 'Ikona (praca/zakupy/inne/dom/auto/narzedzia/gwiazda/serce/bateria/flaga)'
        required: false
        default: 'inne'
      folder_color:
        description: 'Kolor (blue/green/gray/purple/orange/pink/teal/indigo)'
        required: false
        default: 'blue'
      kv_namespace_id:
        description: 'KV Namespace ID (z Cloudflare)'
        required: true

jobs:
  manage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zarządzaj folderami przez KV API
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          KV_NAMESPACE_ID: ${{ inputs.kv_namespace_id }}
          ACTION: ${{ inputs.action }}
          FOLDER_ID: ${{ inputs.folder_id }}
          FOLDER_NAME: ${{ inputs.folder_name }}
          FOLDER_ICON: ${{ inputs.folder_icon }}
          FOLDER_COLOR: ${{ inputs.folder_color }}
        run: python3 scripts/manage_folders.py
